# ============================================================
# Nginx 反向代理配置（生产优化版）
# ============================================================
# 性能优化要点：
# 1. GZip 压缩（level=6 平衡压缩率与 CPU）
# 2. 静态资源缓存（一年 + immutable）
# 3. 后端代理连接复用（keepalive）
# 4. HTTP/2 启用（多路复用 + 首屏更快）
# 5. SSL Session 缓存（TLS 握手加速）
# 6. Brotli 压缩（可选，比 GZip 更高效）
# ============================================================

# ---------- 上游后端 ----------
upstream kb_backend {
    # IP Hash 保证同一用户请求落到同一 worker（session 亲和性）
    ip_hash;

    # 至少配置 2 个 worker 端口（uvicorn 多 worker 模式）
    server 127.0.0.1:8000;
    server 127.0.0.1:8001;
    server 127.0.0.1:8002;
    server 127.0.0.1:8003;

    # 性能优化：keepalive 连接池（与上游保持长连接）
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ---------- HTTP 服务器 ----------
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # 强制 HTTPS（生产环境必须）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL 证书（使用 Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 性能优化：启用 GZip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # 性能优化：客户端静态资源缓存
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        proxy_pass http://127.0.0.1:5173;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 性能优化：上传文件大小（500MB）
    client_max_body_size 500M;

    # 后端 API 代理
    location /api/ {
        proxy_pass http://kb_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 性能优化：上游 keepalive（与 upstream 块配合）
        proxy_set_header Connection "";

        # 超时设置（AI 接口可能较慢）
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # 缓冲优化
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
    }

    # 健康检查端点（用于负载均衡器）
    location = /health {
        proxy_pass http://kb_backend/health;
        access_log off;
    }

    # 前端 SPA
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 隐藏 Nginx 版本
    server_tokens off;

    # 日志
    access_log /var/log/nginx/kb_access.log;
    error_log /var/log/nginx/kb_error.log warn;
}